<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0&family=DM+Sans:wght@400;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0608; }

  .slide {
    position:relative;
    width:1584px; height:396px;
    overflow:hidden;
    background:#0a0608;
    font-family:"DM Sans", sans-serif;
  }

  .hero-glow {
    position:absolute; inset:0; z-index:1;
    background:
      radial-gradient(ellipse 60% 60% at 70% 50%, rgba(129,28,129,.18) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 20% 60%, rgba(255,107,53,.08) 0%, transparent 60%);
  }

  .particle-field {
    position:absolute; inset:0; z-index:1;
  }

  .hero-arc {
    position:absolute;
    bottom:-80px; right:8%;
    z-index:1;
    width:400px; height:400px;
    border-radius:50%;
    border:1px solid transparent;
    border-top-color:rgba(55,255,233,0.60);
    border-right-color:rgba(0,224,200,0.10);
  }
  .hero-arc-2 {
    position:absolute;
    bottom:-40px; right:10%;
    z-index:1;
    width:280px; height:280px;
    border-radius:50%;
    border:.5px solid #fb3b3b38;
    border-top-color:rgba(255,68,0,0.88);
  }
  .hero-dot {
    position:absolute;
    bottom:70px; right:23%;
    z-index:2;
    width:14px; height:14px;
    border-radius:50%;
    background:#FF6B35;
    box-shadow:0 0 0 1px rgba(255,107,53,.4), 0 0 16px rgba(255,107,53,.7);
  }

  .text-block {
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:flex-start;
    padding-left:96px;
  }
  .line1 {
    font-family:"DM Serif Display", serif;
    font-size:38px;
    font-weight:400;
    color:rgba(255,255,255,0.92);
    line-height:1.2;
  }
  .line2 {
    font-family:"DM Serif Display", serif;
    font-size:50px;
    font-weight:400;
    color:#FF6B35;
    line-height:1.2;
